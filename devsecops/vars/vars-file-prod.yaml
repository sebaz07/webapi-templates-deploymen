variables:

  agent-pool: linux
  appName: my-api
  appservice: my-api-prod
  az-acr-image: portal-api
  az-acr-name: acrprodsecops
  az-acr-registry: acrdevsecops.azurecr.io
  imagerepository: api
  az-acr-tag: prod
  az-resourcegroup-name: Devsecops-deployment
  az-sp-service-connection: SPAZD00001
  envprefix: prod
  ASPNETCORE_ENVIRONMENT: Production

  ## SonarQube
  sonar-project-key: my-api-prod
  sonar-service-connection: SC-SONARQUBE

  ### Veracode
  veracode-app-profile: 00000-api
  # renamed from 'veracode-saandbox-name' (typo) — templates use the new key
  veracode-sandbox-name: 00000-api-prod
  veracode-service-connection: SC-VERACODE

  ### Notifications (PROD only — consumed by 'Email notification: start')
  # Teams/Logic App/SMTP-bridge webhook; leave empty to skip notifications
  notification-webhook-url: ''
